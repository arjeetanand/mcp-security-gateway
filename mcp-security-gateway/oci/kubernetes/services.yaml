apiVersion: v1
kind: Service
metadata:
  name: mcp-security-gateway
  namespace: mcp-security-gateway
  annotations:
    oci.oraclecloud.com/load-balancer-type: "lb"
spec:
  type: LoadBalancer
  selector:
    app: mcp-security-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: sample-server
  namespace: mcp-security-gateway
spec:
  type: ClusterIP
  selector:
    app: sample-server
  ports:
    - name: http
      port: 8090
      targetPort: http
