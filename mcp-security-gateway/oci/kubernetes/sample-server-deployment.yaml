apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-server
  namespace: mcp-security-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-server
  template:
    metadata:
      labels:
        app: sample-server
    spec:
      serviceAccountName: sample-server-sa
      securityContext:
        runAsNonRoot: true
      containers:
        - name: sample-server
          image: iad.ocir.io/<tenancy-namespace>/sample-mcp-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsUser: 10001
            runAsGroup: 10001
