apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: mcp-security-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: opa
          image: openpolicyagent/opa:latest
          args: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
          ports:
            - containerPort: 8181
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: policy
              mountPath: /policies
              readOnly: true
      volumes:
        - name: policy
          configMap:
            name: opa-policy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: mcp-security-gateway
data:
  gateway.rego: |
    package mcp.authz

    default decision := {"allow": false, "reason": "policy_denied"}

    has_required_role if {
      count(object.get(input, "required_roles", [])) == 0
    }

    has_required_role if {
      some role in object.get(input.user, "roles", [])
      some required in object.get(input, "required_roles", [])
      role == required
    }

    decision := {"allow": false, "reason": "missing_required_role"} if {
      not has_required_role
    }

    decision := {"allow": false, "reason": "approval_required"} if {
      has_required_role
      object.get(input, "requires_approval", false)
      not object.get(input, "is_approved", false)
    }

    decision := {"allow": true, "reason": "allowed"} if {
      has_required_role
      not object.get(input, "requires_approval", false)
    }

    decision := {"allow": true, "reason": "allowed_after_approval"} if {
      has_required_role
      object.get(input, "requires_approval", false)
      object.get(input, "is_approved", false)
    }
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: mcp-security-gateway
spec:
  selector:
    app: opa
  ports:
    - name: http
      port: 8181
      targetPort: http
