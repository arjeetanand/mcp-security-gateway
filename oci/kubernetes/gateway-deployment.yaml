apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-security-gateway
  namespace: mcp-security-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-security-gateway
  template:
    metadata:
      labels:
        app: mcp-security-gateway
    spec:
      serviceAccountName: gateway-sa
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      containers:
        - name: gateway
          image: iad.ocir.io/<tenancy-namespace>/mcp-security-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: UPSTREAM_SERVERS_FILE
              value: /app/config/upstreams.json
            - name: TOOL_POLICY_FILE
              value: /app/config/tool_policies.json
            - name: DATABASE_PATH
              value: /app/data/gateway.db
            - name: OPA_URL
              value: http://opa.mcp-security-gateway.svc.cluster.local:8181/v1/data/mcp/authz/decision
            - name: ENABLE_FALLBACK_POLICY_ENGINE
              value: "false"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsUser: 10001
            runAsGroup: 10001
          volumeMounts:
            - name: gateway-config
              mountPath: /app/config
              readOnly: true
            - name: gateway-data
              mountPath: /app/data
            - name: oci-vault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-config
        - name: gateway-data
          emptyDir: {}
        - name: oci-vault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: gateway-oci-vault
